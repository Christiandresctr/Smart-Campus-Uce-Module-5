name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [internship-service, document-service]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: apps/${{ matrix.service }}

      - name: Build
        run: npm run build
        working-directory: apps/${{ matrix.service }}

      - name: Run tests
        run: npm test
        working-directory: apps/${{ matrix.service }}