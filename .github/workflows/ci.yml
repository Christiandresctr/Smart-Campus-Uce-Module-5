name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          services=()
          for dir in apps/*/; do
            [ -f "${dir}Dockerfile" ] && services+=("$(basename "$dir")")
          done
          echo "matrix={\"service\":$(printf '%s\n' "${services[@]}" | jq -R . | jq -s .)}" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install, build, test
        run: |
          cd "apps/${{ matrix.service }}"
          if [ -f package.json ]; then
            pnpm install
            pnpm run build
            pnpm test || true
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pytest || true
          fi
  
  jira-transition:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.event_name == 'push'
    
    steps:
      - name: Transition Jira issue to En curso
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          ISSUE_KEY=$(echo "$COMMIT_MSG" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1)
          if [ -z "$ISSUE_KEY" ]; then
            echo "No issue key found in commit message"
            exit 0
          fi
          echo "Found issue: $ISSUE_KEY"
          
          echo "Available transitions:"
          curl -s -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            "$JIRA_URL/rest/api/2/issue/$ISSUE_KEY/transitions" | jq .
          
          echo "Transitioning to En curso..."
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -X POST \
            -H "Content-Type: application/json" \
            "$JIRA_URL/rest/api/2/issue/$ISSUE_KEY/transitions" \
            -d '{"transition": {"id": "21"}}')
          echo "HTTP status: $RESP"