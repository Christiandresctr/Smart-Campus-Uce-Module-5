name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [internship-service, document-service]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: apps/${{ matrix.service }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: apps/${{ matrix.service }}

      - name: Build
        run: pnpm run build
        working-directory: apps/${{ matrix.service }}

      - name: Run tests
        run: pnpm test
        working-directory: apps/${{ matrix.service }}