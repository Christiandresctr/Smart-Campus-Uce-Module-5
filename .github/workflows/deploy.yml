name: Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - test
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push internship-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/internship-service/Dockerfile
          push: true

      - name: Build and push document-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/document-service/Dockerfile
          push: true

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/internship-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/document-service:latest
            docker stop internship-service || true
            docker rm internship-service || true
            docker stop document-service || true
            docker rm document-service || true
            docker run -d --name internship-service -p 3001:3001 ${{ secrets.DOCKER_USERNAME }}/internship-service:latest
            docker run -d --name document-service -p 3002:3002 ${{ secrets.DOCKER_USERNAME }}/document-service:latest

      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Find issue key in PR title
        id: find
        uses: atlassian/gajira-find-issue-key@v3
        with:
          string: ${{ github.event.pull_request.title }}

      - name: Transition to In Review (merge a test)
        if: steps.find.outputs.issue && github.event.pull_request.base.ref == 'test'
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.find.outputs.issue }}
          transition: "In Review"

      - name: Transition to Listo (merge a main)
        if: steps.find.outputs.issue && github.event.pull_request.base.ref == 'main'
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.find.outputs.issue }}
          transition: "Listo"