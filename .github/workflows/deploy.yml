name: Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - test
      - main

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push internship-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/internship-service/Dockerfile
          push: true

      - name: Build and push document-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/document-service/Dockerfile
          push: true

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/internship-service:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/document-service:latest
            docker stop internship-service || true
            docker rm internship-service || true
            docker stop document-service || true
            docker rm document-service || true
            docker run -d --name internship-service -p 3001:3001 ${{ secrets.DOCKER_USERNAME }}/internship-service:latest
            docker run -d --name document-service -p 3002:3002 ${{ secrets.DOCKER_USERNAME }}/document-service:latest

      - name: Transition Jira issue
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ISSUE_KEY=$(echo "$PR_TITLE" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1)
          if [ -z "$ISSUE_KEY" ]; then
            echo "No issue key found in PR title"
            exit 0
          fi
          echo "Found issue: $ISSUE_KEY"
          
          if [ "$TARGET_BRANCH" = "test" ]; then
            TRANSITION="En revisión"
          elif [ "$TARGET_BRANCH" = "main" ]; then
            TRANSITION="Listo"
          else
            echo "Unknown target branch: $TARGET_BRANCH"
            exit 0
          fi
          
          echo "Transitioning to: $TRANSITION"
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -X POST \
            -H "Content-Type: application/json" \
            "$JIRA_URL/rest/api/2/issue/$ISSUE_KEY/transitions" \
            -d "{\"transition\": {\"name\": \"$TRANSITION\"}}")
          echo "HTTP status: $RESP"