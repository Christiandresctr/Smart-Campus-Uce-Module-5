events {}

http {
    upstream internship {
        server internship-service:3001;
    }
    upstream document {
        server document-service:3002;
    }
    upstream approval {
        server approval-workflow:3003;
    }
    upstream reports {
        server report-hours:3004;
    }

    server {
        listen 80;
        server_name _;

        # Health
        location = /health {
            return 200 "OK";
        }

        # Internship Service
        location /api/v1/internship/ {
            proxy_pass http://internship/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/docs {
            proxy_pass http://internship/api/docs;
        }

        # Document Service
        location /api/v1/document/ {
            proxy_pass http://document/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /document/api/docs {
            proxy_pass http://document/api/docs;
        }

        # Approval Workflow
        location /api/v1/approval/ {
            proxy_pass http://approval/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /approval/api/docs {
            proxy_pass http://approval/api/docs;
        }

        # Report Hours
        location /api/v1/reports/ {
            proxy_pass http://reports/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /reports/docs {
            proxy_pass http://reports/docs;
        }

        # Future services — agregar aquí:
        # location /api/v1/evaluation/ { proxy_pass http://evaluation:3005/; }
        # location /api/v1/notification/ { proxy_pass http://notification:3006/; }
        # etc.
    }
}