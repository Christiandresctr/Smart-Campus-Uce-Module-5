events {}

http {
    upstream internship {
        server internship-service:3001;
    }
    upstream document {
        server document-service:3002;
    }
    upstream approval {
        server approval-workflow:3003;
    }
    upstream reports {
        server report-hours:3004;
    }
    upstream company {
        server company-service:3006;
    }
    upstream audit {
        server audit-log-service:3007;
    }
    upstream notification {
        server notification-service:3005;
    }
    upstream scheduling {
        server scheduling-service:3008;
    }
    upstream evaluation {
        server evaluation-service:3009;
    }
    upstream compliance {
        server compliance-service:3010;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            return 200 "OK";
        }

        location /api/v1/internship/ {
            proxy_pass http://internship;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/docs {
            proxy_pass http://internship/api/docs;
        }

        location /api/v1/document/ {
            proxy_pass http://document;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /document/api/docs {
            proxy_pass http://document/api/docs;
        }

         location /document/api/docs/swagger-ui-bundle.js {
            proxy_pass http://document/api/docs/swagger-ui-bundle.js;
        }
        location /document/api/docs/swagger-ui.css {
            proxy_pass http://document/api/docs/swagger-ui.css;
        }
        location /document/api/docs/swagger-ui-init.js {
            proxy_pass http://document/api/docs/swagger-ui-init.js;
        }
        location /document/api/docs/swagger-config {
            proxy_pass http://document/api/docs/swagger-config;
        }

        location /api/v1/approval/ {
            proxy_pass http://approval;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /approval/api/docs {
            proxy_pass http://approval/api/docs;
        }

         location /approval/api/docs/swagger-ui-bundle.js {
            proxy_pass http://approval/api/docs/swagger-ui-bundle.js;
        }
        location /approval/api/docs/swagger-ui.css {
            proxy_pass http://approval/api/docs/swagger-ui.css;
        }
        location /approval/api/docs/swagger-ui-init.js {
            proxy_pass http://approval/api/docs/swagger-ui-init.js;
        }
        location /approval/api/docs/swagger-config {
            proxy_pass http://approval/api/docs/swagger-config;
        }

        location /api/v1/reports/ {
            proxy_pass http://reports/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /reports/ {
            proxy_pass http://reports/;
        }

        location /api/v1/company/ {
            proxy_pass http://company;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/audit/ {
            proxy_pass http://audit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /notification/ {
            proxy_pass http://notification;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /schedule/ {
            proxy_pass http://scheduling;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /evaluations/ {
            proxy_pass http://evaluation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /compliance/ {
            proxy_pass http://compliance;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }
}